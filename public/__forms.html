<!doctype html>
<!-- Static skeleton so Netlify's build bot can detect the order form. Not user-facing. -->
<html>
  <head>
    <meta charset="utf-8" />
    <title>Forms</title>
  </head>
  <body>
    <form name="porudzbina" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="porudzbina" />
      <input name="bot-field" />
      <input name="ime" />
      <input name="prezime" />
      <input name="email" />
      <input name="telefon" />
      <input name="adresa" />
      <input name="grad" />
      <textarea name="napomena"></textarea>
      <textarea name="porudzbina"></textarea>
      <input name="ukupno" />
    </form>
  </body>
</html>
